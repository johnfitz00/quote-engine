# All Kafka properties are declared here so tests do not depend on the main application.properties.
# Tests that need embedded Kafka override spring.kafka.bootstrap-servers via @TestPropertySource.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=quote-engine
spring.kafka.consumer.auto-offset-reset=earliest
# Prevent the Kafka consumer from trying to connect during tests that don't use Kafka.
# RatingConsumerIntegrationTest overrides this back to true via @TestPropertySource.
spring.kafka.listener.auto-startup=false
